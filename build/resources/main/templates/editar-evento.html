<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Editar Evento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .navbar { background: white; border-bottom: 1px solid #e5e7eb; }
        .card { border-radius: 20px; border: 1px solid #e5e7eb; box-shadow: 0 20px 40px rgba(0,0,0,0.06); }
        .form-control { border-radius: 12px; padding: 0.75rem 1rem; border: 1px solid #e5e7eb; }
        .form-control:focus { border-color: #4f46e5; box-shadow: 0 0 0 0.15rem rgba(79,70,229,0.15); }
        .btn-create { background-color: #4f46e5; border: none; border-radius: 999px; font-weight: 600; }
        label { font-weight: 500; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Sistema de Gestion de Eventos</a>
        <div class="d-flex gap-2">
            <a href="/eventos" class="btn btn-outline-secondary btn-sm">← Volver</a>
            <form action="/logout" method="post">
                <button class="btn btn-outline-danger btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <div class="card p-4" style="max-width: 600px; margin: auto;">
        <h2 class="fw-bold mb-1 text-center">Editar Evento</h2>
        <p class="text-center text-muted mb-4">Modifica los datos del evento</p>

        <form id="formEditar" method="post">
            <div class="mb-3">
                <label class="form-label">Título</label>
                <input id="titulo" name="titulo" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Descripción</label>
                <textarea id="descripcion" name="descripcion" class="form-control" rows="3"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Fecha y hora</label>
                <input id="fechaHora" name="fechaHora" type="datetime-local" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Lugar</label>
                <input id="lugar" name="lugar" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Cupo máximo</label>
                <input id="cupoMaximo" name="cupoMaximo" type="number" min="1" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-create btn-primary w-100 mt-2">Guardar cambios</button>
        </form>
    </div>
</div>

<script>

    const id = window.location.pathname.split('/')[2];


    fetch(`/eventos/${id}/datos`)
        .then(res => res.json())
        .then(evento => {
            console.log(evento);
            console.log('fechaHora:', evento.fechaHora);

            document.getElementById('titulo').value = evento.titulo;
            document.getElementById('descripcion').value = evento.descripcion ?? '';
            document.getElementById('lugar').value = evento.lugar;
            document.getElementById('cupoMaximo').value = evento.cupoMaximo;

            const fecha = new Date(evento.fechaHora);
            const fechaFormateada = fecha.toISOString().slice(0, 16);
            document.getElementById('fechaHora').value = fechaFormateada;

            document.getElementById('formEditar').action = `/eventos/${id}/editar`;
        });
</script>

</body>
</html>
