<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syncro — Editar Evento</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #f4f3ff;
            --surface:   #ffffff;
            --border:    rgba(108,99,255,0.12);
            --border2:   rgba(108,99,255,0.28);
            --accent:    #6c63ff;
            --accent3:   #00b894;
            --text:      #14131f;
            --muted:     #9896b0;
            --muted2:    #6b6985;
            --shadow-lg: 0 20px 60px rgba(108,99,255,0.14);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; flex-direction: column;
            overflow-x: hidden;
        }

        body::before {
            content: ''; position: fixed; top: -15%; left: -8%;
            width: 650px; height: 650px;
            background: radial-gradient(circle, rgba(108,99,255,0.1) 0%, transparent 65%);
            pointer-events: none; z-index: 0;
        }
        body::after {
            content: ''; position: fixed; bottom: -15%; right: -8%;
            width: 550px; height: 550px;
            background: radial-gradient(circle, rgba(0,184,148,0.08) 0%, transparent 65%);
            pointer-events: none; z-index: 0;
        }

        /* ── NAVBAR ── */
        nav {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 2.5rem; height: 64px;
            background: rgba(244,243,255,0.82);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .nav-logo {
            font-family: 'Syne', sans-serif; font-weight: 800;
            font-size: 1.35rem; letter-spacing: -0.5px;
            color: var(--text); text-decoration: none;
            display: flex; align-items: center; gap: 0.55rem;
        }
        .nav-logo-dot {
            width: 9px; height: 9px; border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 0 3px rgba(108,99,255,0.18);
            animation: breathe 2.2s ease-in-out infinite;
        }
        @keyframes breathe {
            0%,100% { box-shadow: 0 0 0 3px rgba(108,99,255,0.18); }
            50%      { box-shadow: 0 0 0 6px rgba(108,99,255,0.07); }
        }

        .nav-right { display: flex; align-items: center; gap: 0.75rem; }

        .btn-back {
            font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500;
            padding: 0.42rem 1rem; border-radius: 8px;
            border: 1.5px solid var(--border2); background: transparent;
            color: var(--muted2); cursor: pointer; text-decoration: none;
            display: inline-flex; align-items: center; gap: 0.4rem;
            transition: all 0.18s;
        }
        .btn-back:hover { color: var(--accent); border-color: var(--accent); background: rgba(108,99,255,0.06); }

        .btn-logout {
            font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500;
            padding: 0.42rem 1rem; border-radius: 8px;
            border: 1px solid rgba(239,68,68,0.25); background: rgba(239,68,68,0.06);
            color: #dc2626; cursor: pointer; transition: all 0.18s;
        }
        .btn-logout:hover { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.4); }

        /* ── PAGE ── */
        .page-center {
            flex: 1; display: flex; align-items: flex-start; justify-content: center;
            padding: 3rem 1.5rem; position: relative; z-index: 1;
        }

        /* ── CARD ── */
        .form-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 24px; padding: 2.75rem 2.5rem;
            width: 100%; max-width: 600px;
            box-shadow: var(--shadow-lg);
            animation: fadeUp 0.55s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-header-area {
            display: flex; flex-direction: column; align-items: center;
            gap: 0.4rem; margin-bottom: 1.75rem;
        }

        .card-icon {
            width: 48px; height: 48px; border-radius: 14px;
            background: linear-gradient(135deg, rgba(0,184,148,0.12) 0%, rgba(0,184,148,0.05) 100%);
            border: 1px solid rgba(0,184,148,0.25);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; margin-bottom: 0.5rem;
        }

        .card-title {
            font-family: 'Syne', sans-serif; font-weight: 800;
            font-size: 1.35rem; letter-spacing: -0.5px;
            color: var(--text); text-align: center;
        }
        .card-subtitle {
            font-size: 0.87rem; color: var(--muted2); text-align: center;
        }

        .event-tag {
            display: inline-flex; align-items: center; gap: 0.4rem;
            font-size: 0.75rem; font-weight: 600; letter-spacing: 0.06em;
            text-transform: uppercase; padding: 0.28rem 0.75rem;
            border-radius: 999px; margin-top: 0.3rem;
            color: #047857; border: 1px solid rgba(4,120,87,0.22);
            background: rgba(4,120,87,0.07);
        }
        .event-tag::before {
            content: ''; width: 6px; height: 6px; border-radius: 50%;
            background: #10b981;
        }

        .card-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border2), transparent);
            margin-bottom: 1.75rem;
        }

        /* ── FORM GRID ── */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem 1.1rem;
        }
        .field-full { grid-column: 1 / -1; }

        .field label {
            display: block; font-size: 0.76rem; font-weight: 600;
            letter-spacing: 0.07em; text-transform: uppercase;
            color: var(--muted2); margin-bottom: 0.45rem;
        }

        .field input,
        .field textarea {
            width: 100%; font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem; color: var(--text);
            background: var(--bg); border: 1.5px solid var(--border);
            border-radius: 12px; padding: 0.75rem 1rem; outline: none;
            resize: vertical; transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
        }
        .field input::placeholder,
        .field textarea::placeholder { color: var(--muted); }
        .field input:focus,
        .field textarea:focus {
            border-color: var(--accent); background: #fff;
            box-shadow: 0 0 0 4px rgba(108,99,255,0.1);
        }

        .field input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            opacity: 0.4; cursor: pointer;
        }

        /* ── MAP SECTION ── */
        .map-section {
            grid-column: 1 / -1;
            display: flex; flex-direction: column; gap: 0.6rem;
        }

        .map-section label {
            display: block; font-size: 0.76rem; font-weight: 600;
            letter-spacing: 0.07em; text-transform: uppercase;
            color: var(--muted2);
        }

        /* Location input with search button */
        .lugar-wrapper {
            position: relative; display: flex; gap: 0.5rem;
        }
        .lugar-wrapper input {
            flex: 1; font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem; color: var(--text);
            background: var(--bg); border: 1.5px solid var(--border);
            border-radius: 12px; padding: 0.75rem 1rem; outline: none;
            transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
        }
        .lugar-wrapper input::placeholder { color: var(--muted); }
        .lugar-wrapper input:focus {
            border-color: var(--accent); background: #fff;
            box-shadow: 0 0 0 4px rgba(108,99,255,0.1);
        }
        .btn-geocode {
            font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 600;
            padding: 0 1rem; border-radius: 12px; flex-shrink: 0;
            border: 1.5px solid var(--border2); background: rgba(108,99,255,0.07);
            color: var(--accent); cursor: pointer;
            display: flex; align-items: center; gap: 0.4rem;
            transition: all 0.18s; white-space: nowrap;
        }
        .btn-geocode:hover { background: rgba(108,99,255,0.14); border-color: var(--accent); }
        .btn-geocode:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Nominatim autocomplete dropdown */
        .nominatim-results {
            position: absolute; top: calc(100% + 6px); left: 0;
            width: calc(100% - 3.6rem - 0.5rem); /* align with input only */
            background: var(--surface); border: 1.5px solid var(--border2);
            border-radius: 14px; box-shadow: 0 12px 36px rgba(108,99,255,0.14);
            z-index: 200; overflow: hidden;
            max-height: 240px; overflow-y: auto;
        }
        .nominatim-results:empty { display: none; }
        .nominatim-item {
            padding: 0.7rem 1rem; font-size: 0.86rem; color: var(--text);
            cursor: pointer; display: flex; align-items: flex-start; gap: 0.5rem;
            border-bottom: 1px solid var(--border); transition: background 0.12s;
            line-height: 1.4;
        }
        .nominatim-item:last-child { border-bottom: none; }
        .nominatim-item:hover { background: rgba(108,99,255,0.06); }
        .nominatim-item-icon { flex-shrink: 0; margin-top: 1px; opacity: 0.5; }
        .nominatim-item-name { font-weight: 500; }
        .nominatim-item-sub  { font-size: 0.76rem; color: var(--muted2); }

        /* Map hint */
        .map-hint {
            font-size: 0.76rem; color: var(--muted2);
            display: flex; align-items: center; gap: 0.35rem;
        }
        .map-hint svg { flex-shrink: 0; opacity: 0.6; }

        /* Map container */
        .map-container {
            width: 100%; height: 280px; border-radius: 16px;
            overflow: hidden; border: 1.5px solid var(--border);
            position: relative;
            box-shadow: 0 4px 20px rgba(108,99,255,0.08);
            transition: border-color 0.2s;
        }
        .map-container.loading::after {
            content: ''; position: absolute; inset: 0;
            background: rgba(244,243,255,0.7);
            display: flex; align-items: center; justify-content: center;
            z-index: 10;
        }
        #map { width: 100%; height: 100%; }

        /* Map geocoding spinner overlay */
        .map-spinner-overlay {
            position: absolute; inset: 0; display: none;
            align-items: center; justify-content: center;
            background: rgba(244,243,255,0.65);
            backdrop-filter: blur(4px);
            z-index: 500; border-radius: 14px;
        }
        .map-spinner-overlay.active { display: flex; }
        .spinner {
            width: 28px; height: 28px; border-radius: 50%;
            border: 3px solid rgba(108,99,255,0.15);
            border-top-color: var(--accent);
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Map coords badge */
        .coords-badge {
            position: absolute; bottom: 10px; left: 10px; z-index: 400;
            background: rgba(20,19,31,0.82); backdrop-filter: blur(8px);
            border-radius: 8px; padding: 0.28rem 0.65rem;
            font-size: 0.7rem; font-family: 'DM Mono', monospace, monospace;
            color: rgba(255,255,255,0.85); display: none;
            letter-spacing: 0.03em; pointer-events: none;
        }
        .coords-badge.visible { display: block; }

        /* Leaflet overrides to match theme */
        .leaflet-container { font-family: 'DM Sans', sans-serif; }
        .leaflet-popup-content-wrapper {
            border-radius: 12px !important;
            box-shadow: 0 8px 24px rgba(108,99,255,0.18) !important;
            border: 1px solid var(--border2) !important;
            font-family: 'DM Sans', sans-serif !important;
            font-size: 0.84rem !important;
            color: var(--text) !important;
            padding: 0 !important;
        }
        .leaflet-popup-content {
            margin: 0.65rem 0.9rem !important;
            font-size: 0.84rem !important;
        }
        .leaflet-popup-tip-container { display: none !important; }

        /* Custom marker */
        .custom-marker-pin {
            width: 32px; height: 32px;
            background: var(--accent);
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            border: 3px solid white;
            box-shadow: 0 4px 14px rgba(108,99,255,0.45);
            position: relative;
        }
        .custom-marker-pin::after {
            content: '';
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 10px; height: 10px;
            background: white; border-radius: 50%;
        }

        /* ── BUTTONS ROW ── */
        .btn-row {
            display: grid; grid-template-columns: 1fr 2fr;
            gap: 0.75rem; margin-top: 0.5rem;
        }

        .btn-cancel-form {
            font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 600;
            color: var(--muted2); background: rgba(107,105,133,0.07);
            border: 1.5px solid var(--border); border-radius: 12px;
            padding: 0.85rem 1rem; cursor: pointer; text-decoration: none;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.18s;
        }
        .btn-cancel-form:hover { color: var(--text); border-color: var(--border2); background: rgba(107,105,133,0.12); }

        .btn-submit {
            font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700;
            letter-spacing: 0.02em; color: white;
            background: linear-gradient(135deg, var(--accent3) 0%, #00d4aa 100%);
            border: none; border-radius: 12px; padding: 0.85rem 1rem;
            cursor: pointer; box-shadow: 0 4px 20px rgba(0,184,148,0.28);
            transition: all 0.22s cubic-bezier(0.34, 1.4, 0.64, 1);
            position: relative; overflow: hidden;
        }
        .btn-submit::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
            opacity: 0; transition: opacity 0.2s;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,184,148,0.38); }
        .btn-submit:hover::before { opacity: 1; }
        .btn-submit:active { transform: translateY(0); }

        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, var(--bg) 25%, rgba(108,99,255,0.06) 50%, var(--bg) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 8px; height: 1em; display: inline-block; min-width: 120px;
        }
        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @media (max-width: 540px) {
            .form-card { padding: 2rem 1.5rem; }
            .form-grid { grid-template-columns: 1fr; }
            .field-full { grid-column: 1; }
            .map-section { grid-column: 1; }
            .btn-row { grid-template-columns: 1fr; }
            nav { padding: 0 1.25rem; }
            .nominatim-results { width: 100%; }
        }

        .nav-user { display: flex; align-items: center; gap: 0.6rem; }
        .nav-username { font-size: 0.83rem; color: var(--muted2); font-weight: 500; }
        .nav-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            border: 2px solid var(--border2);
            background: rgba(108,99,255,0.08);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; flex-shrink: 0;
            font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8rem;
            color: var(--accent);
        }
        .nav-avatar img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<nav>
    <a class="nav-logo" href="/">
        <span class="nav-logo-dot"></span>
        syncro
    </a>
    <div class="nav-right">
        <a href="/eventos" class="btn-back">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            Volver
        </a>
        <div class="nav-user">
            <span class="nav-username" id="navUsername"></span>
            <div class="nav-avatar" id="navAvatar"></div>
        </div>
        <form action="/logout" method="post" style="margin:0">
            <button class="btn-logout" type="submit">Cerrar sesión</button>
        </form>
    </div>
</nav>

<div class="page-center">
    <div class="form-card">

        <div class="card-header-area">
            <div class="card-icon">✏️</div>
            <div class="card-title">Editar evento</div>
            <div class="card-subtitle">Modifica los datos del evento</div>
            <div class="event-tag" id="eventTag"><span class="skeleton"></span></div>
        </div>

        <div class="card-divider"></div>

        <form id="formEditar" method="post">
            <div class="form-grid">

                <div class="field field-full">
                    <label for="titulo">Título</label>
                    <input id="titulo" name="titulo" type="text" placeholder="Título del evento" required>
                </div>

                <div class="field field-full">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" name="descripcion" rows="3" placeholder="Descripción del evento..."></textarea>
                </div>

                <div class="field">
                    <label for="fechaHora">Fecha y hora</label>
                    <input id="fechaHora" name="fechaHora" type="datetime-local" required>
                </div>

                <div class="field">
                    <label for="cupoMaximo">Cupo máximo</label>
                    <input id="cupoMaximo" name="cupoMaximo" type="number" min="1" placeholder="Ej. 50" required>
                </div>

                <!-- LUGAR + MAPA -->
                <div class="map-section">
                    <label>Lugar</label>

                    <div class="lugar-wrapper" id="lugarWrapper">
                        <input
                                id="lugar"
                                name="lugar"
                                type="text"
                                placeholder="Busca un lugar o haz clic en el mapa"
                                required
                                autocomplete="off"
                        >
                        <button type="button" class="btn-geocode" id="btnBuscar">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                            </svg>
                            Buscar
                        </button>
                        <div class="nominatim-results" id="nominatimResults"></div>
                    </div>

                    <div class="map-hint">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                        </svg>
                        Haz clic en el mapa para mover el marcador, o busca una dirección arriba.
                    </div>

                    <div class="map-container" id="mapContainer">
                        <div id="map"></div>
                        <div class="map-spinner-overlay" id="mapSpinner">
                            <div class="spinner"></div>
                        </div>
                        <div class="coords-badge" id="coordsBadge"></div>
                    </div>

                    <input type="hidden" name="lat" id="latInput">
                    <input type="hidden" name="lng" id="lngInput">
                </div>

            </div>

            <div class="btn-row" style="margin-top:1.4rem">
                <a href="/eventos" class="btn-cancel-form">Cancelar</a>
                <button type="submit" class="btn-submit">Guardar cambios →</button>
            </div>
        </form>

    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
    // ─── Custom marker icon ───────────────────────────────────────────────────────
    const pinIcon = L.divIcon({
        className: '',
        html: `<div class="custom-marker-pin"></div>`,
        iconSize:   [32, 32],
        iconAnchor: [16, 32],
        popupAnchor:[0, -36]
    });

    // ─── Map init ─────────────────────────────────────────────────────────────────
    const map = L.map('map', {
        center: [18.4861, -69.9312], // Santo Domingo fallback
        zoom: 13,
        zoomControl: true,
        attributionControl: true
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 19
    }).addTo(map);

    let marker = null;
    const lugarInput   = document.getElementById('lugar');
    const latInput     = document.getElementById('latInput');
    const lngInput     = document.getElementById('lngInput');
    const coordsBadge  = document.getElementById('coordsBadge');
    const mapSpinner   = document.getElementById('mapSpinner');
    const nominatimEl  = document.getElementById('nominatimResults');

    // ─── Helper: place / move marker ─────────────────────────────────────────────
    function placeMarker(lat, lng, label, zoom = 15) {
        if (marker) {
            marker.setLatLng([lat, lng]);
        } else {
            marker = L.marker([lat, lng], { icon: pinIcon, draggable: true }).addTo(map);
            marker.on('dragend', () => {
                const pos = marker.getLatLng();
                reverseGeocode(pos.lat, pos.lng);
            });
        }
        map.flyTo([lat, lng], zoom, { duration: 1.1 });
        latInput.value = lat.toFixed(7);
        lngInput.value = lng.toFixed(7);
        coordsBadge.textContent = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
        coordsBadge.classList.add('visible');
        if (label) {
            marker.bindPopup(`<strong>${label}</strong>`).openPopup();
            lugarInput.value = label;
        }
    }

    // ─── Click on map ─────────────────────────────────────────────────────────────
    map.on('click', (e) => {
        const { lat, lng } = e.latlng;
        reverseGeocode(lat, lng);
    });

    // ─── Reverse geocode (lat,lng → name) ─────────────────────────────────────────
    async function reverseGeocode(lat, lng) {
        mapSpinner.classList.add('active');
        try {
            const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&addressdetails=1`;
            const res = await fetch(url, { headers: { 'Accept-Language': 'es' } });
            const data = await res.json();
            const name = data.display_name ?? `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
            placeMarker(lat, lng, name);
        } catch (err) {
            placeMarker(lat, lng, `${lat.toFixed(5)}, ${lng.toFixed(5)}`);
        } finally {
            mapSpinner.classList.remove('active');
        }
    }

    // ─── Forward geocode (query → results list) ───────────────────────────────────
    let searchDebounce = null;

    async function searchPlace(query) {
        if (!query.trim()) { nominatimEl.innerHTML = ''; return; }
        mapSpinner.classList.add('active');
        try {
            const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=6&addressdetails=1`;
            const res = await fetch(url, { headers: { 'Accept-Language': 'es' } });
            const results = await res.json();
            renderResults(results);
        } catch {
            nominatimEl.innerHTML = '';
        } finally {
            mapSpinner.classList.remove('active');
        }
    }

    function renderResults(results) {
        nominatimEl.innerHTML = '';
        if (!results.length) {
            nominatimEl.innerHTML = `<div class="nominatim-item"><span class="nominatim-item-name" style="color:var(--muted2)">Sin resultados</span></div>`;
            return;
        }
        results.forEach(r => {
            const item = document.createElement('div');
            item.className = 'nominatim-item';

            // Short display name: first two parts
            const parts  = r.display_name.split(', ');
            const main   = parts.slice(0, 2).join(', ');
            const sub    = parts.slice(2, 5).join(', ');

            item.innerHTML = `
            <svg class="nominatim-item-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
            </svg>
            <div>
                <div class="nominatim-item-name">${main}</div>
                ${sub ? `<div class="nominatim-item-sub">${sub}</div>` : ''}
            </div>`;

            item.addEventListener('click', () => {
                placeMarker(parseFloat(r.lat), parseFloat(r.lon), r.display_name);
                nominatimEl.innerHTML = '';
            });
            nominatimEl.appendChild(item);
        });
    }

    // ─── Input listeners ─────────────────────────────────────────────────────────
    lugarInput.addEventListener('input', () => {
        clearTimeout(searchDebounce);
        searchDebounce = setTimeout(() => searchPlace(lugarInput.value), 420);
    });

    document.getElementById('btnBuscar').addEventListener('click', () => {
        searchPlace(lugarInput.value);
    });

    lugarInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); searchPlace(lugarInput.value); }
    });

    // Close dropdown on outside click
    document.addEventListener('click', (e) => {
        if (!document.getElementById('lugarWrapper').contains(e.target)) {
            nominatimEl.innerHTML = '';
        }
    });

    // ─── Load event data from server ─────────────────────────────────────────────
    const id = window.location.pathname.split('/')[2];

    fetch(`/eventos/${id}/datos`)
        .then(res => res.json())
        .then(evento => {
            document.getElementById('titulo').value      = evento.titulo;
            document.getElementById('descripcion').value = evento.descripcion ?? '';
            document.getElementById('cupoMaximo').value  = evento.cupoMaximo;
            lugarInput.value                             = evento.lugar;

            const fecha = new Date(evento.fechaHora);
            document.getElementById('fechaHora').value = fecha.toISOString().slice(0, 16);
            document.getElementById('formEditar').action = `/eventos/${id}/editar`;

            const tag = document.getElementById('eventTag');
            tag.innerHTML = `<span style="width:6px;height:6px;border-radius:50%;background:#10b981;display:inline-block"></span>${evento.titulo}`;

            if (evento.lat && evento.lng) {
                placeMarker(parseFloat(evento.lat), parseFloat(evento.lng), evento.lugar);
            } else if (evento.lugar) {
                geocodeLugar(evento.lugar);
            }
        });

    // ─── Geocode the initial saved lugar ─────────────────────────────────────────
    async function geocodeLugar(query) {
        mapSpinner.classList.add('active');
        try {
            const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1`;
            const res = await fetch(url, { headers: { 'Accept-Language': 'es' } });
            const results = await res.json();
            if (results.length) {
                const r = results[0];
                placeMarker(parseFloat(r.lat), parseFloat(r.lon), query, 14);
            }
        } catch { }
        finally { mapSpinner.classList.remove('active'); }
    }
</script>

<script>
    (function () {
        fetch('/session').then(r => r.ok ? r.json() : null).then(user => {
            if (!user) return;
            const nombre = user.nombre ?? user.username;
            const usernameEl = document.getElementById('navUsername');
            const avatarEl   = document.getElementById('navAvatar');
            if (usernameEl) usernameEl.textContent = '@' + user.username;
            if (avatarEl) {
                if (user.fotoPerfil) {
                    avatarEl.innerHTML = `<img src="${user.fotoPerfil}" alt="${nombre}">`;
                } else {
                    avatarEl.textContent = nombre.charAt(0).toUpperCase();
                }
            }
        }).catch(() => {});
    })();
</script>
</body>
</html>
