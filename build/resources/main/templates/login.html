<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syncro — Iniciar sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f4f3ff;
      --surface:  #ffffff;
      --border:   rgba(108,99,255,0.12);
      --border2:  rgba(108,99,255,0.28);
      --accent:   #6c63ff;
      --accent2:  #ff6b9d;
      --text:     #14131f;
      --muted:    #9896b0;
      --muted2:   #6b6985;
      --shadow:   0 2px 16px rgba(108,99,255,0.08);
      --shadow-lg:0 20px 60px rgba(108,99,255,0.16);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Blobs */
    body::before {
      content: '';
      position: fixed;
      top: -15%; left: -8%;
      width: 650px; height: 650px;
      background: radial-gradient(circle, rgba(108,99,255,0.1) 0%, transparent 65%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -15%; right: -8%;
      width: 550px; height: 550px;
      background: radial-gradient(circle, rgba(255,107,157,0.08) 0%, transparent 65%);
      pointer-events: none; z-index: 0;
    }

    /* ── NAVBAR ── */
    nav {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      padding: 0 2.5rem;
      height: 64px;
      background: rgba(244,243,255,0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.35rem;
      letter-spacing: -0.5px;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.55rem;
    }

    .nav-logo-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.18);
      animation: breathe 2.2s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { box-shadow: 0 0 0 3px rgba(108,99,255,0.18); }
      50%       { box-shadow: 0 0 0 6px rgba(108,99,255,0.07); }
    }

    /* ── CENTER LAYOUT ── */
    .page-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      position: relative;
      z-index: 1;
    }

    /* ── CARD ── */
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.75rem 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
      animation: fadeUp 0.55s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── CARD HEADER ── */
    .card-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .card-brand-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.6rem;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .card-brand-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.18);
      animation: breathe 2.2s ease-in-out infinite;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.25rem;
      letter-spacing: -0.4px;
      color: var(--text);
      text-align: center;
    }

    .card-subtitle {
      font-size: 0.88rem;
      color: var(--muted2);
      text-align: center;
      margin-top: 0.25rem;
    }

    /* ── DIVIDER ── */
    .card-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border2), transparent);
      margin-bottom: 1.75rem;
    }

    /* ── FORM ── */
    .field {
      margin-bottom: 1rem;
    }

    .field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 0.45rem;
    }

    .field input {
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
    }

    .field input::placeholder { color: var(--muted); }

    .field input:focus {
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(108,99,255,0.1);
    }

    /* ── CHECKBOX ── */
    .check-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.75rem;
      margin-top: 0.25rem;
    }

    .check-row input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 17px; height: 17px;
      border: 1.5px solid var(--border2);
      border-radius: 5px;
      background: var(--bg);
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
      position: relative;
    }

    .check-row input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .check-row input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      top: 2px; left: 5px;
      width: 5px; height: 8px;
      border: 2px solid white;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .check-row label {
      font-size: 0.85rem;
      color: var(--muted2);
      cursor: pointer;
      user-select: none;
    }

    /* ── BUTTON ── */
    .btn-login {
      width: 100%;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: white;
      background: linear-gradient(135deg, var(--accent) 0%, #857dff 100%);
      border: none;
      border-radius: 12px;
      padding: 0.82rem 1rem;
      cursor: pointer;
      transition: all 0.22s cubic-bezier(0.34, 1.4, 0.64, 1);
      box-shadow: 0 4px 20px rgba(108,99,255,0.3);
      position: relative;
      overflow: hidden;
    }

    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(108,99,255,0.4);
    }
    .btn-login:hover::before { opacity: 1; }
    .btn-login:active { transform: translateY(0); }

    /* ── ERROR ── */
    .error-msg {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.82rem;
      color: #dc2626;
      background: rgba(220,38,38,0.07);
      border: 1px solid rgba(220,38,38,0.18);
      border-radius: 10px;
      padding: 0.65rem 0.9rem;
      margin-bottom: 1.25rem;
    }

    @media (max-width: 480px) {
      .login-card { padding: 2rem 1.5rem; border-radius: 20px; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">
    <span class="nav-logo-dot"></span>
    syncro
  </a>
</nav>

<div class="page-center">
  <div class="login-card">

    <!-- Brand -->
    <div class="card-brand">
      <div class="card-brand-logo">
        <span class="card-brand-dot"></span>
        syncro
      </div>
      <div class="card-title">Bienvenido de vuelta</div>
      <div class="card-subtitle">Inicia sesión para continuar</div>
    </div>

    <div class="card-divider"></div>

    <!-- Error -->
    <div class="error-msg" id="errorMsg" style="display:none">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      Usuario o contraseña incorrectos.
    </div>

    <form action="/login" method="post">

      <div class="field">
        <label for="username">Usuario</label>
        <input id="username" name="username" type="text"
               placeholder="tu_usuario"
               th:value="${username}"
               autocomplete="username"
               required>
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password"
               placeholder="••••••••"
               autocomplete="current-password"
               required>
      </div>

      <div class="check-row">
        <input type="checkbox" name="recordar" id="recordar">
        <label for="recordar">Recordar usuario</label>
      </div>

      <button class="btn-login" type="submit">Entrar →</button>

    </form>
  </div>
</div>

<script>
  if (window.location.search.includes('error')) {
    document.getElementById('errorMsg').style.display = 'flex';
  }
</script>
</body>
</html>
