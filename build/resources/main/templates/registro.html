<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Registro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; }
    .navbar { background-color: white; border-bottom: 1px solid #e5e7eb; }
    .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }
    .card { border-radius: 20px; border: 1px solid #e5e7eb; box-shadow: 0 20px 40px rgba(0,0,0,0.06); }
    .form-control { border-radius: 12px; padding: 0.75rem 1rem; border: 1px solid #e5e7eb; }
    .form-control:focus { border-color: #4f46e5; box-shadow: 0 0 0 0.15rem rgba(79,70,229,0.15); }
    .btn-create { background-color: #4f46e5; border: none; border-radius: 999px; padding: 0.6rem 1.2rem; font-weight: 600; }
    .btn-create:hover { background-color: #4338ca; }
    label { font-weight: 500; }
  </style>
</head>

<body>

<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand" href="/">Sistema de Gestion de Eventos</a>
    <a href="/login" class="btn btn-outline-primary btn-sm">Login</a>
  </div>
</nav>

<div class="container mt-5 mb-5">
  <div class="card p-4" style="max-width: 500px; margin: auto;">
    <h2 class="fw-bold mb-1 text-center">Crear cuenta</h2>
    <p class="text-center text-muted mb-4">Regístrate como participante</p>

    <form action="/registro" method="post">

      <div class="mb-3">
        <label class="form-label">Username</label>
        <input name="username" class="form-control" placeholder="Username" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Nombre completo</label>
        <input name="nombre" class="form-control" placeholder="Nombre completo" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input name="password" type="password" class="form-control" placeholder="Password" required>
      </div>

      <button type="submit" class="btn btn-create btn-primary w-100 mt-2">Registrarse</button>
    </form>

    <p class="text-center text-muted mt-3" style="font-size: 0.9rem;">
      ¿Ya tienes cuenta? <a href="/login">Inicia sesión</a>
    </p>
  </div>
</div>

</body>
</html>
