<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syncro — Eventos</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #f4f3ff;
            --surface:   #ffffff;
            --border:    rgba(108,99,255,0.12);
            --border2:   rgba(108,99,255,0.25);
            --accent:    #6c63ff;
            --accent2:   #ff6b9d;
            --accent3:   #00b894;
            --text:      #14131f;
            --muted:     #9896b0;
            --muted2:    #6b6985;
            --shadow:    0 2px 16px rgba(108,99,255,0.08);
            --shadow-lg: 0 8px 40px rgba(108,99,255,0.13);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed; top: -15%; left: -8%;
            width: 650px; height: 650px;
            background: radial-gradient(circle, rgba(108,99,255,0.09) 0%, transparent 65%);
            pointer-events: none; z-index: 0;
        }
        body::after {
            content: '';
            position: fixed; bottom: -15%; right: -8%;
            width: 550px; height: 550px;
            background: radial-gradient(circle, rgba(0,184,148,0.08) 0%, transparent 65%);
            pointer-events: none; z-index: 0;
        }

        /* ── NAVBAR ── */
        nav {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 2.5rem; height: 64px;
            background: rgba(244,243,255,0.82);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .nav-logo {
            font-family: 'Syne', sans-serif; font-weight: 800;
            font-size: 1.35rem; letter-spacing: -0.5px;
            color: var(--text); text-decoration: none;
            display: flex; align-items: center; gap: 0.55rem;
        }
        .nav-logo-dot {
            width: 9px; height: 9px; border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 0 3px rgba(108,99,255,0.18);
            animation: breathe 2.2s ease-in-out infinite;
        }
        @keyframes breathe {
            0%,100% { box-shadow: 0 0 0 3px rgba(108,99,255,0.18); }
            50%      { box-shadow: 0 0 0 6px rgba(108,99,255,0.07); }
        }

        .nav-right { display: flex; align-items: center; gap: 0.75rem; }

        .btn-logout {
            font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500;
            padding: 0.42rem 1rem; border-radius: 8px;
            border: 1px solid rgba(239,68,68,0.25); background: rgba(239,68,68,0.06);
            color: #dc2626; cursor: pointer; transition: all 0.18s;
        }
        .btn-logout:hover { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.4); }

        /* ── MAIN ── */
        main {
            position: relative; z-index: 1;
            max-width: 1200px; margin: 0 auto;
            padding: 3rem 2.5rem 5rem;
        }

        /* ── PAGE HEADER ── */
        .page-header {
            display: flex; align-items: flex-end; justify-content: space-between;
            gap: 1rem; margin-bottom: 2.5rem;
            animation: fadeUp 0.5s ease both;
        }

        .page-eyebrow {
            display: inline-flex; align-items: center; gap: 0.5rem;
            font-size: 0.72rem; font-weight: 600; letter-spacing: 0.14em;
            text-transform: uppercase; color: var(--accent); margin-bottom: 0.4rem;
        }
        .page-eyebrow::before {
            content: ''; display: block; width: 18px; height: 1.5px;
            background: var(--accent); border-radius: 2px;
        }

        .page-title {
            font-family: 'Syne', sans-serif; font-weight: 800;
            font-size: 2rem; letter-spacing: -1px; color: var(--text);
        }

        .header-actions { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }

        .btn-primary-action {
            font-family: 'Syne', sans-serif; font-size: 0.88rem; font-weight: 700;
            color: white;
            background: linear-gradient(135deg, var(--accent) 0%, #857dff 100%);
            border: none; border-radius: 12px; padding: 0.7rem 1.35rem;
            display: inline-flex; align-items: center; gap: 0.4rem;
            cursor: pointer; white-space: nowrap; text-decoration: none;
            box-shadow: 0 4px 16px rgba(108,99,255,0.28);
            transition: all 0.22s cubic-bezier(0.34, 1.4, 0.64, 1);
        }
        .btn-primary-action:hover {
            transform: translateY(-2px); color: white;
            box-shadow: 0 8px 28px rgba(108,99,255,0.38);
        }

        .btn-secondary-action {
            font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 600;
            color: var(--accent);
            background: rgba(108,99,255,0.07);
            border: 1.5px solid var(--border2); border-radius: 12px;
            padding: 0.7rem 1.2rem;
            display: inline-flex; align-items: center; gap: 0.4rem;
            cursor: pointer; white-space: nowrap; text-decoration: none;
            transition: all 0.18s;
        }
        .btn-secondary-action:hover { background: rgba(108,99,255,0.13); color: var(--accent); }

        /* ── EVENTS GRID ── */
        .eventos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.25rem;
            animation: fadeUp 0.5s 0.08s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── EVENT CARD ── */
        .evento-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            position: relative; overflow: hidden;
            display: flex; flex-direction: column; gap: 0;
            transition: transform 0.22s, box-shadow 0.22s, border-color 0.22s;
        }
        .evento-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
            border-color: var(--border2);
        }
        .evento-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            opacity: 0; transition: opacity 0.2s;
        }
        .evento-card:hover::before { opacity: 1; }
        .evento-card.publicado::before  { background: linear-gradient(90deg, var(--accent3), var(--accent)); }
        .evento-card.borrador::before   { background: linear-gradient(90deg, var(--muted), transparent); }
        .evento-card.cancelado::before  { background: linear-gradient(90deg, #ef4444, #f97316); }

        /* Card top row */
        .card-top {
            display: flex; align-items: flex-start;
            justify-content: space-between; gap: 0.75rem;
            margin-bottom: 0.6rem;
        }

        .evento-titulo {
            font-family: 'Syne', sans-serif; font-weight: 700;
            font-size: 1.05rem; letter-spacing: -0.3px;
            color: var(--text); line-height: 1.3;
        }

        /* Status badges */
        .badge {
            display: inline-flex; align-items: center; gap: 0.35rem;
            font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em;
            text-transform: uppercase; padding: 0.25rem 0.65rem;
            border-radius: 999px; border: 1px solid; white-space: nowrap; flex-shrink: 0;
        }
        .badge::before {
            content: ''; width: 5px; height: 5px; border-radius: 50%;
        }
        .badge.publicado {
            color: #047857; border-color: rgba(4,120,87,0.22); background: rgba(4,120,87,0.07);
        }
        .badge.publicado::before { background: #10b981; animation: blink 2s ease-in-out infinite; }
        .badge.cancelado {
            color: #dc2626; border-color: rgba(220,38,38,0.22); background: rgba(220,38,38,0.07);
        }
        .badge.cancelado::before { background: #ef4444; }
        .badge.borrador {
            color: var(--muted2); border-color: rgba(107,105,133,0.2); background: rgba(107,105,133,0.06);
        }
        .badge.borrador::before { background: var(--muted); }

        @keyframes blink {
            0%,100% { opacity: 1; } 50% { opacity: 0.4; }
        }

        .evento-desc {
            font-size: 0.85rem; color: var(--muted2);
            line-height: 1.55; margin-bottom: 1rem;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }

        .card-divider {
            height: 1px; background: var(--border); margin-bottom: 0.9rem;
        }

        .evento-meta { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 1.1rem; }
        .meta-item {
            display: flex; align-items: center; gap: 0.5rem;
            font-size: 0.8rem; color: var(--muted2);
        }
        .meta-item svg { flex-shrink: 0; color: var(--muted); }
        .meta-item strong { color: var(--text); font-weight: 500; }

        /* ── CARD ACTIONS ── */
        .card-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: auto; }

        .btn-card {
            font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 600;
            padding: 0.4rem 0.85rem; border-radius: 8px;
            cursor: pointer; border: 1.5px solid; transition: all 0.16s;
            white-space: nowrap; text-decoration: none; display: inline-flex;
            align-items: center; gap: 0.3rem;
        }

        .btn-card.outline-accent {
            color: var(--accent); border-color: var(--border2);
            background: rgba(108,99,255,0.05);
        }
        .btn-card.outline-accent:hover { background: rgba(108,99,255,0.12); }

        .btn-card.danger {
            color: #dc2626; border-color: rgba(220,38,38,0.22);
            background: rgba(220,38,38,0.05);
        }
        .btn-card.danger:hover { background: rgba(220,38,38,0.12); }

        .btn-card.success {
            color: #047857; border-color: rgba(4,120,87,0.22);
            background: rgba(4,120,87,0.06);
        }
        .btn-card.success:hover { background: rgba(4,120,87,0.13); }

        .btn-card.warning {
            color: #b45309; border-color: rgba(180,83,9,0.22);
            background: rgba(180,83,9,0.06);
        }
        .btn-card.warning:hover { background: rgba(180,83,9,0.13); }

        .btn-card.muted {
            color: var(--muted2); border-color: var(--border);
            background: transparent;
        }
        .btn-card.muted:hover { background: rgba(108,99,255,0.05); color: var(--accent); }

        /* Inscribirse (full width) */
        .btn-inscribir {
            width: 100%; font-family: 'Syne', sans-serif; font-size: 0.88rem; font-weight: 700;
            color: white;
            background: linear-gradient(135deg, var(--accent3) 0%, #00d4aa 100%);
            border: none; border-radius: 10px; padding: 0.65rem 1rem;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(0,184,148,0.25);
            transition: all 0.2s cubic-bezier(0.34, 1.4, 0.64, 1);
        }
        .btn-inscribir:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 22px rgba(0,184,148,0.35);
        }

        .error-msg {
            font-size: 0.8rem; color: #dc2626;
            margin-top: 0.5rem;
            display: flex; align-items: center; gap: 0.35rem;
        }

        /* ── EMPTY ── */
        .empty {
            grid-column: 1/-1; padding: 4rem 2rem; text-align: center;
            color: var(--muted); font-size: 0.9rem;
            background: var(--surface); border: 1.5px dashed var(--border2);
            border-radius: 20px;
        }
        .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

        @media (max-width: 640px) {
            main { padding: 2rem 1.25rem 4rem; }
            nav { padding: 0 1.25rem; }
            .page-header { flex-direction: column; align-items: flex-start; }
            .eventos-grid { grid-template-columns: 1fr; }
        }
        .nav-user { display: flex; align-items: center; gap: 0.6rem; }
        .nav-username { font-size: 0.83rem; color: var(--muted2); font-weight: 500; }
        .nav-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            border: 2px solid var(--border2);
            background: rgba(108,99,255,0.08);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; flex-shrink: 0;
            font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8rem;
            color: var(--accent);
        }
        .nav-avatar img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<nav>
    <a class="nav-logo" href="/">
        <span class="nav-logo-dot"></span>
        syncro
    </a>
    <div class="nav-right" id="navAcciones">
        <div class="nav-user">
            <span class="nav-username" id="navUsername"></span>
            <div class="nav-avatar" id="navAvatar"></div>
        </div>
        <form action="/logout" method="post" style="margin:0">
            <button class="btn-logout" type="submit">Cerrar sesión</button>
        </form>
    </div>
</nav>

<main>

    <div class="page-header">
        <div>
            <div class="page-eyebrow">Catálogo</div>
            <h1 class="page-title">Eventos</h1>
        </div>
        <div class="header-actions" id="headerActions"></div>
    </div>

    <div class="eventos-grid" id="listaEventos">
        <div class="empty">
            <div class="empty-icon">📅</div>
            Cargando eventos...
        </div>
    </div>

</main>

<script>
    let usuarioActual = null;

    fetch('/session')
        .then(res => res.json())
        .then(user => {
            usuarioActual = user;
            const puedeGestionar = user.rol === 'ADMIN' || user.rol === 'ORGANIZADOR';

            if (puedeGestionar) {
                const actions = document.getElementById('headerActions');
                actions.innerHTML = `
          <button class="btn-secondary-action" onclick="location.href='/eventos/escanear'">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3h3v-6h-6v3z"/>
            </svg>
            Escanear QR
          </button>
          <button class="btn-primary-action" onclick="location.href='/eventos/crear'">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Crear evento
          </button>`;
            }

            cargarEventos();
        });

    function cargarEventos() {
        fetch('/eventos/lista')
            .then(res => res.json())
            .then(eventos => {
                const lista = document.getElementById('listaEventos');

                if (!eventos.length) {
                    lista.innerHTML = `
            <div class="empty">
              <div class="empty-icon">📭</div>
              No hay eventos registrados.
            </div>`;
                    return;
                }

                lista.innerHTML = '';

                eventos.forEach(e => {
                    const estado  = e.cancelado ? 'cancelado' : (e.publicado ? 'publicado' : 'borrador');
                    const etiqueta= e.cancelado ? 'Cancelado'  : (e.publicado ? 'Publicado'  : 'Borrador');
                    const fecha   = new Date(e.fechaHora).toLocaleString('es', { dateStyle: 'medium', timeStyle: 'short' });

                    const card = document.createElement('div');
                    card.className = `evento-card ${estado}`;
                    card.innerHTML = `
            <div class="card-top">
              <div class="evento-titulo">${e.titulo}</div>
              <span class="badge ${estado}">${etiqueta}</span>
            </div>
            ${e.descripcion ? `<div class="evento-desc">${e.descripcion}</div>` : ''}
            <div class="card-divider"></div>
            <div class="evento-meta">
              <div class="meta-item">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                  <circle cx="12" cy="10" r="3"/>
                </svg>
                ${e.lugar}
              </div>
              <div class="meta-item">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                </svg>
                ${fecha}
              </div>
              <div class="meta-item">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                  <circle cx="9" cy="7" r="4"/>
                  <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                  <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                Cupo: <strong>${e.cupoMaximo}</strong>
              </div>
            </div>
            <div class="card-actions" id="acciones-${e.id}"></div>`;

                    lista.appendChild(card);

                    const acciones = document.getElementById(`acciones-${e.id}`);
                    const puedeGestionar = usuarioActual.rol === 'ADMIN' || usuarioActual.rol === 'ORGANIZADOR';

                    if (puedeGestionar && !e.cancelado) {
                        acciones.innerHTML = `
              <a href="/eventos/${e.id}/editar" class="btn-card outline-accent">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
                Editar
              </a>
              <form action="/eventos/${e.id}/cancelar" method="post" style="margin:0">
                <button type="submit" class="btn-card danger">
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                  </svg>
                  Cancelar
                </button>
              </form>
              ${!e.publicado
                            ? `<form action="/eventos/${e.id}/publicar" method="post" style="margin:0">
                     <button type="submit" class="btn-card success">
                       <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                         <polyline points="20 6 9 17 4 12"/>
                       </svg>
                       Publicar
                     </button>
                   </form>`
                            : `<form action="/eventos/${e.id}/despublicar" method="post" style="margin:0">
                     <button type="submit" class="btn-card warning">
                       <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                         <circle cx="12" cy="12" r="10"/>
                         <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
                       </svg>
                       Despublicar
                     </button>
                   </form>`
                        }
              <a href="/eventos/${e.id}/estadisticas" class="btn-card muted">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
                  <line x1="6" y1="20" x2="6" y2="14"/>
                </svg>
                Stats
              </a>`;
                    }

                    if (usuarioActual.rol === 'PARTICIPANTE' && e.publicado && !e.cancelado) {
                        acciones.innerHTML = `
              <div style="width:100%">
                <button class="btn-inscribir" onclick="inscribirse(${e.id})">
                  Inscribirse →
                </button>
                <div class="error-msg" id="error-${e.id}" style="display:none">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                  </svg>
                  <span></span>
                </div>
              </div>`;
                    }
                });
            });
    }

    function inscribirse(eventoId) {
        fetch(`/eventos/${eventoId}/inscribir`, { method: 'POST' })
            .then(res => {
                if (res.ok) {
                    window.location.href = '/mis-eventos';
                } else {
                    return res.json().then(data => {
                        const el = document.getElementById(`error-${eventoId}`);
                        el.style.display = 'flex';
                        el.querySelector('span').textContent = data.error;
                    });
                }
            });
    }
</script>

<script>
    (function() {
        fetch('/session').then(r => r.ok ? r.json() : null).then(user => {
            if (!user) return;
            const nombre = user.nombre ?? user.username;
            const usernameEl = document.getElementById('navUsername');
            const avatarEl   = document.getElementById('navAvatar');
            if (usernameEl) usernameEl.textContent = '@' + user.username;
            if (avatarEl) {
                if (user.fotoPerfil) {
                    avatarEl.innerHTML = '<img src="' + user.fotoPerfil + '" alt="' + nombre + '">';
                } else {
                    avatarEl.textContent = nombre.charAt(0).toUpperCase();
                }
            }
        }).catch(() => {});
    })();
</script>
</body>
</html>
