<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syncro — Escanear QR</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f4f3ff; --surface: #ffffff;
            --border: rgba(108,99,255,0.12); --border2: rgba(108,99,255,0.28);
            --accent: #6c63ff; --accent3: #00b894;
            --text: #14131f; --muted: #9896b0; --muted2: #6b6985;
            --shadow-lg: 0 20px 60px rgba(108,99,255,0.14);
        }
        body {
            font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; top: -15%; left: -8%; width: 650px; height: 650px;
            background: radial-gradient(circle, rgba(108,99,255,0.1) 0%, transparent 65%);
            pointer-events: none; z-index: 0;
        }
        body::after {
            content: ''; position: fixed; bottom: -15%; right: -8%; width: 550px; height: 550px;
            background: radial-gradient(circle, rgba(0,184,148,0.08) 0%, transparent 65%);
            pointer-events: none; z-index: 0;
        }
        nav {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 2.5rem; height: 64px;
            background: rgba(244,243,255,0.82); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .nav-logo {
            font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.35rem;
            letter-spacing: -0.5px; color: var(--text); text-decoration: none;
            display: flex; align-items: center; gap: 0.55rem;
        }
        .nav-logo-dot {
            width: 9px; height: 9px; border-radius: 50%; background: var(--accent);
            box-shadow: 0 0 0 3px rgba(108,99,255,0.18);
            animation: breathe 2.2s ease-in-out infinite;
        }
        @keyframes breathe {
            0%,100% { box-shadow: 0 0 0 3px rgba(108,99,255,0.18); }
            50%      { box-shadow: 0 0 0 6px rgba(108,99,255,0.07); }
        }
        .nav-right { display: flex; align-items: center; gap: 0.75rem; }
        .btn-back {
            font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500;
            padding: 0.42rem 1rem; border-radius: 8px;
            border: 1.5px solid var(--border2); background: transparent;
            color: var(--muted2); text-decoration: none;
            display: inline-flex; align-items: center; gap: 0.4rem; transition: all 0.18s;
        }
        .btn-back:hover { color: var(--accent); border-color: var(--accent); background: rgba(108,99,255,0.06); }
        .btn-logout {
            font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500;
            padding: 0.42rem 1rem; border-radius: 8px;
            border: 1px solid rgba(239,68,68,0.25); background: rgba(239,68,68,0.06);
            color: #dc2626; cursor: pointer; transition: all 0.18s;
        }
        .btn-logout:hover { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.4); }

        .page-center {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 3rem 1.5rem; position: relative; z-index: 1;
        }
        .scan-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 24px; padding: 2.5rem 2.5rem 2.25rem;
            width: 100%; max-width: 480px;
            box-shadow: var(--shadow-lg); animation: fadeUp 0.55s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .card-header-area {
            display: flex; flex-direction: column; align-items: center;
            gap: 0.4rem; margin-bottom: 1.75rem;
        }
        .card-icon {
            width: 48px; height: 48px; border-radius: 14px;
            background: linear-gradient(135deg, rgba(108,99,255,0.12), rgba(0,184,148,0.08));
            border: 1px solid var(--border2);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; margin-bottom: 0.5rem;
        }
        .card-title {
            font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.35rem;
            letter-spacing: -0.5px; color: var(--text); text-align: center;
        }
        .card-subtitle { font-size: 0.87rem; color: var(--muted2); text-align: center; }
        .card-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border2), transparent);
            margin-bottom: 1.5rem;
        }

        /* QR Reader overrides */
        #reader {
            width: 100% !important;
            border-radius: 16px;
            overflow: hidden;
            border: none !important;
        }
        #reader video { border-radius: 12px; }
        #reader__scan_region { border-radius: 12px; overflow: hidden; }
        #reader__dashboard { padding-top: 0.75rem !important; }
        #reader__dashboard_section_swaplink,
        #reader__dashboard_section_csr button {
            font-family: 'DM Sans', sans-serif !important;
            border-radius: 10px !important;
            font-size: 0.85rem !important;
        }

        /* Result panel */
        .resultado { display: none; margin-top: 1.25rem; }

        .result-box {
            display: flex; align-items: flex-start; gap: 0.85rem;
            padding: 1rem 1.1rem; border-radius: 14px; border: 1.5px solid;
            margin-bottom: 1rem;
        }
        .result-box.exito {
            color: #047857; border-color: rgba(4,120,87,0.22); background: rgba(4,120,87,0.07);
        }
        .result-box.error {
            color: #dc2626; border-color: rgba(220,38,38,0.22); background: rgba(220,38,38,0.07);
        }
        .result-icon { font-size: 1.25rem; flex-shrink: 0; margin-top: 1px; }
        .result-text { font-size: 0.9rem; font-weight: 500; line-height: 1.4; }

        .btn-reiniciar {
            width: 100%; font-family: 'Syne', sans-serif; font-size: 0.92rem; font-weight: 700;
            color: white;
            background: linear-gradient(135deg, var(--accent) 0%, #857dff 100%);
            border: none; border-radius: 12px; padding: 0.82rem 1rem;
            cursor: pointer; box-shadow: 0 4px 20px rgba(108,99,255,0.28);
            transition: all 0.22s cubic-bezier(0.34, 1.4, 0.64, 1);
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .btn-reiniciar:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(108,99,255,0.38); }

        /* scanning indicator */
        .scan-hint {
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            font-size: 0.78rem; color: var(--muted2); margin-top: 0.85rem;
        }
        .scan-dot {
            width: 6px; height: 6px; border-radius: 50%; background: var(--accent3);
            animation: blink 1.5s ease-in-out infinite;
        }
        @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

        @media (max-width: 480px) { .scan-card { padding: 2rem 1.5rem; } nav { padding: 0 1.25rem; } }
        .nav-user { display: flex; align-items: center; gap: 0.6rem; }
        .nav-username { font-size: 0.83rem; color: var(--muted2); font-weight: 500; }
        .nav-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            border: 2px solid var(--border2);
            background: rgba(108,99,255,0.08);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; flex-shrink: 0;
            font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8rem;
            color: var(--accent);
        }
        .nav-avatar img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
<nav>
    <a class="nav-logo" href="/"><span class="nav-logo-dot"></span>syncro</a>
    <div class="nav-right">
        <a href="/eventos" class="btn-back">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            Volver
        </a>
        <div class="nav-user">
            <span class="nav-username" id="navUsername"></span>
            <div class="nav-avatar" id="navAvatar"></div>
        </div>
        <form action="/logout" method="post" style="margin:0">
            <button class="btn-logout" type="submit">Cerrar sesión</button>
        </form>
    </div>
</nav>

<div class="page-center">
    <div class="scan-card">

        <div class="card-header-area">
            <div class="card-icon">📷</div>
            <div class="card-title">Escanear QR</div>
            <div class="card-subtitle">Apunta la cámara al código del participante</div>
        </div>

        <div class="card-divider"></div>

        <div id="reader"></div>

        <div class="scan-hint" id="scanHint">
            <span class="scan-dot"></span>
            Escaneando — mantén el QR dentro del encuadre
        </div>

        <div class="resultado" id="resultado">
            <div class="result-box exito" id="mensajeExito" style="display:none">
                <span class="result-icon">✅</span>
                <span class="result-text" id="textoExito"></span>
            </div>
            <div class="result-box error" id="mensajeError" style="display:none">
                <span class="result-icon">❌</span>
                <span class="result-text" id="textoError"></span>
            </div>
            <button class="btn-reiniciar" onclick="reiniciar()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="23 4 23 10 17 10"/>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                </svg>
                Escanear otro
            </button>
        </div>

    </div>
</div>

<script>
    let scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 220 });
    scanner.render(onScanSuccess, () => {});

    function onScanSuccess(decodedText) {
        scanner.clear();
        document.getElementById('scanHint').style.display = 'none';

        try {
            const datos = JSON.parse(decodedText);
            fetch('/eventos/validar-qr', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            })
                .then(res => res.json())
                .then(data => {
                    document.getElementById('resultado').style.display = 'block';
                    if (data.mensaje) {
                        const el = document.getElementById('mensajeExito');
                        el.style.display = 'flex';
                        document.getElementById('textoExito').textContent = data.mensaje;
                    } else {
                        const el = document.getElementById('mensajeError');
                        el.style.display = 'flex';
                        document.getElementById('textoError').textContent = data.error;
                    }
                });
        } catch {
            document.getElementById('resultado').style.display = 'block';
            const el = document.getElementById('mensajeError');
            el.style.display = 'flex';
            document.getElementById('textoError').textContent = 'QR inválido o no reconocido.';
        }
    }

    function reiniciar() {
        document.getElementById('resultado').style.display = 'none';
        document.getElementById('mensajeExito').style.display = 'none';
        document.getElementById('mensajeError').style.display = 'none';
        document.getElementById('scanHint').style.display = 'flex';
        scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 220 });
        scanner.render(onScanSuccess, () => {});
    }
</script>

<script>
    (function() {
        fetch('/session').then(r => r.ok ? r.json() : null).then(user => {
            if (!user) return;
            const nombre = user.nombre ?? user.username;
            const usernameEl = document.getElementById('navUsername');
            const avatarEl   = document.getElementById('navAvatar');
            if (usernameEl) usernameEl.textContent = '@' + user.username;
            if (avatarEl) {
                if (user.fotoPerfil) {
                    avatarEl.innerHTML = '<img src="' + user.fotoPerfil + '" alt="' + nombre + '">';
                } else {
                    avatarEl.textContent = nombre.charAt(0).toUpperCase();
                }
            }
        }).catch(() => {});
    })();
</script>
</body>
</html>
