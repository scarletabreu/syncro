<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Usuarios</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    .navbar { background: white; border-bottom: 1px solid #e5e7eb; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">Sistema de Gestion de Eventos</a>
    <form action="/logout" method="post">
      <button class="btn btn-outline-danger btn-sm">Logout</button>
    </form>
  </div>
</nav>

<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">Usuarios</h2>
    <a href="/usuarios/crear" class="btn btn-primary rounded-pill">+ Crear Usuario</a>
  </div>

  <table class="table table-bordered table-hover">
    <thead class="table-dark">
    <tr>
      <th>ID</th>
      <th>Username</th>
      <th>Nombre</th>
      <th>Rol</th>
      <th>Acciones</th>
    </tr>
    </thead>
    <tbody id="tablaUsuarios">
    <tr><td colspan="5" class="text-center">Cargando...</td></tr>
    </tbody>
  </table>
</div>

<script>
  fetch('/usuarios/lista')
          .then(res => res.json())
          .then(usuarios => {
            const tbody = document.getElementById('tablaUsuarios');
            tbody.innerHTML = '';
            usuarios.forEach(u => {
              tbody.innerHTML += `
                <tr>
                    <td>${u.idUser}</td>
                    <td>${u.username}</td>
                    <td>${u.nombre ?? ''}</td>
                     <td>${u.rol}</td>
                    <td>
                        ${u.username.toLowerCase() === 'admin' ?
                            '<span class="text-muted">No modificable</span>' :
                            `<form action="/usuarios/${u.idUser}/rol" method="post" class="d-flex gap-2">
                                <select name="rol" class="form-select form-select-sm">
                                    <option value="PARTICIPANTE">Participante</option>
                                    <option value="ORGANIZADOR">Organizador</option>
                                    <option value="ADMIN">Administrador</option>
                                </select>
                                <button class="btn btn-sm btn-warning">Cambiar</button>
                            </form>`
                        }
                    </td>
                </tr>`;
            });
          });
</script>

</body>
</html>
