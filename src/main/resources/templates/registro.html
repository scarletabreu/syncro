<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syncro — Crear cuenta</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f3ff; --surface: #ffffff;
      --border: rgba(108,99,255,0.12); --border2: rgba(108,99,255,0.28);
      --accent: #6c63ff; --accent2: #ff6b9d;
      --text: #14131f; --muted: #9896b0; --muted2: #6b6985;
      --shadow-lg: 0 20px 60px rgba(108,99,255,0.14);
    }
    body {
      font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; top: -15%; left: -8%; width: 650px; height: 650px;
      background: radial-gradient(circle, rgba(108,99,255,0.1) 0%, transparent 65%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: ''; position: fixed; bottom: -15%; right: -8%; width: 550px; height: 550px;
      background: radial-gradient(circle, rgba(255,107,157,0.08) 0%, transparent 65%);
      pointer-events: none; z-index: 0;
    }
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2.5rem; height: 64px;
      background: rgba(244,243,255,0.82); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.35rem;
      letter-spacing: -0.5px; color: var(--text); text-decoration: none;
      display: flex; align-items: center; gap: 0.55rem;
    }
    .nav-logo-dot {
      width: 9px; height: 9px; border-radius: 50%; background: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.18);
      animation: breathe 2.2s ease-in-out infinite;
    }
    @keyframes breathe {
      0%,100% { box-shadow: 0 0 0 3px rgba(108,99,255,0.18); }
      50%      { box-shadow: 0 0 0 6px rgba(108,99,255,0.07); }
    }
    .btn-nav {
      font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500;
      padding: 0.42rem 1rem; border-radius: 8px;
      border: 1.5px solid var(--border2); background: transparent;
      color: var(--accent); text-decoration: none; transition: all 0.18s;
    }
    .btn-nav:hover { background: rgba(108,99,255,0.07); }
    .page-center {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 3rem 1.5rem; position: relative; z-index: 1;
    }
    .form-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 24px; padding: 2.75rem 2.5rem;
      width: 100%; max-width: 460px;
      box-shadow: var(--shadow-lg); animation: fadeUp 0.55s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-header-area {
      display: flex; flex-direction: column; align-items: center;
      gap: 0.4rem; margin-bottom: 1.75rem;
    }
    .card-icon {
      width: 48px; height: 48px; border-radius: 14px;
      background: linear-gradient(135deg, rgba(108,99,255,0.12), rgba(255,107,157,0.08));
      border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; margin-bottom: 0.5rem;
    }
    .card-title {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.35rem;
      letter-spacing: -0.5px; color: var(--text); text-align: center;
    }
    .card-subtitle { font-size: 0.87rem; color: var(--muted2); text-align: center; }
    .role-badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.28rem 0.75rem; border-radius: 999px; margin-top: 0.25rem;
      color: #047857; border: 1px solid rgba(4,120,87,0.22); background: rgba(4,120,87,0.07);
    }
    .role-badge::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%; background: #10b981;
    }
    .card-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border2), transparent);
      margin-bottom: 1.75rem;
    }
    .field { margin-bottom: 1.1rem; }
    .field label {
      display: block; font-size: 0.76rem; font-weight: 600;
      letter-spacing: 0.07em; text-transform: uppercase;
      color: var(--muted2); margin-bottom: 0.45rem;
    }
    .field input {
      width: 100%; font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
      color: var(--text); background: var(--bg);
      border: 1.5px solid var(--border); border-radius: 12px;
      padding: 0.75rem 1rem; outline: none;
      transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
    }
    .field input::placeholder { color: var(--muted); }
    .field input:focus {
      border-color: var(--accent); background: #fff;
      box-shadow: 0 0 0 4px rgba(108,99,255,0.1);
    }
    .btn-submit {
      width: 100%; margin-top: 0.5rem;
      font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700;
      color: white;
      background: linear-gradient(135deg, var(--accent) 0%, #857dff 100%);
      border: none; border-radius: 12px; padding: 0.85rem 1rem;
      cursor: pointer; box-shadow: 0 4px 20px rgba(108,99,255,0.3);
      transition: all 0.22s cubic-bezier(0.34, 1.4, 0.64, 1);
      position: relative; overflow: hidden;
    }
    .btn-submit::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
      opacity: 0; transition: opacity 0.2s;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(108,99,255,0.4); }
    .btn-submit:hover::before { opacity: 1; }
    .login-link {
      text-align: center; margin-top: 1.25rem;
      font-size: 0.85rem; color: var(--muted2);
    }
    .login-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .login-link a:hover { text-decoration: underline; }
    @media (max-width: 480px) { .form-card { padding: 2rem 1.5rem; } nav { padding: 0 1.25rem; } }
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="/"><span class="nav-logo-dot"></span>syncro</a>
  <a href="/login" class="btn-nav">Iniciar sesión</a>
</nav>
<div class="page-center">
  <div class="form-card">
    <div class="card-header-area">
      <div class="card-icon">✨</div>
      <div class="card-title">Crear cuenta</div>
      <div class="card-subtitle">Únete a Syncro</div>
      <div class="role-badge">Participante</div>
    </div>
    <div class="card-divider"></div>
    <form action="/registro" method="post">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" placeholder="ej. juan_perez" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="nombre">Nombre completo</label>
        <input id="nombre" name="nombre" type="text" placeholder="ej. Juan Pérez" required>
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="new-password" required>
      </div>
      <button type="submit" class="btn-submit">Registrarse →</button>
    </form>
    <p class="login-link">¿Ya tienes cuenta? <a href="/login">Inicia sesión</a></p>
  </div>
</div>
</body>
</html>
