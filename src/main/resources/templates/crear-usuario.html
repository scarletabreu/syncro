<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Crear Usuario</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
      color: #0f172a;
    }

    /* NAVBAR */
    .navbar {
      background-color: white;
      border-bottom: 1px solid #e5e7eb;
    }

    .navbar-brand {
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    /* CARD */
    .card {
      border-radius: 20px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 20px 40px rgba(0,0,0,0.06);
    }

    /* FORM */
    .form-control, .form-select {
      border-radius: 12px;
      padding: 0.75rem 1rem;
      border: 1px solid #e5e7eb;
    }

    .form-control:focus, .form-select:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 0.15rem rgba(79,70,229,0.15);
    }

    .btn-create {
      background-color: #4f46e5;
      border: none;
      border-radius: 999px;
      padding: 0.6rem 1.2rem;
      font-weight: 600;
    }

    .btn-create:hover {
      background-color: #4338ca;
    }

    label {
      font-weight: 500;
    }

    footer {
      color: #64748b;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand" href="/">Sistema de Gestion de Eventos</a>

    <div class="d-flex align-items-center gap-3">

      <a th:if="${user == null}" href="/login" class="btn btn-outline-primary btn-sm">
        Login
      </a>

      <form th:if="${user != null}" action="/logout" method="post">
        <button class="btn btn-outline-danger btn-sm">Logout</button>
      </form>
    </div>
  </div>
</nav>

<!-- FORM -->
<div class="container mt-5 mb-5">
  <div class="card shadow p-4" style="max-width: 600px; margin: auto;">
    <h2 class="fw-bold mb-4 text-center">
      Crear Usuario <span style="font-family:'JetBrains Mono', monospace;"></span>
    </h2>

    <form action="/usuarios" method="post" enctype="multipart/form-data">

      <div class="mb-3">
        <label class="form-label">Username</label>
        <input name="username" class="form-control" placeholder="Username" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Nombre completo</label>
        <input name="nombre" class="form-control" placeholder="Nombre completo" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input name="password" type="password" class="form-control" placeholder="Password" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Asignar Rol</label>
        <select name="rol" class="form-select" required>
          <option value="PARTICIPANTE">Participante</option>
          <option value="ORGANIZADOR">Organizador</option>
          <option value="ADMIN">Administrador</option>
        </select>
      </div>

      <button type="submit" class="btn btn-create w-100">Crear usuario</button>
    </form>
  </div>
</div>

</body>
</html>
