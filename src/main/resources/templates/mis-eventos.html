<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syncro — Mis Inscripciones</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f4f3ff; --surface: #ffffff;
            --border: rgba(108,99,255,0.12); --border2: rgba(108,99,255,0.25);
            --accent: #6c63ff; --accent3: #00b894;
            --text: #14131f; --muted: #9896b0; --muted2: #6b6985;
            --shadow: 0 2px 16px rgba(108,99,255,0.08);
            --shadow-lg: 0 8px 40px rgba(108,99,255,0.13);
        }
        body {
            font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
            min-height: 100vh; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; top: -15%; left: -8%; width: 650px; height: 650px;
            background: radial-gradient(circle, rgba(108,99,255,0.09) 0%, transparent 65%);
            pointer-events: none; z-index: 0;
        }
        body::after {
            content: ''; position: fixed; bottom: -15%; right: -8%; width: 550px; height: 550px;
            background: radial-gradient(circle, rgba(0,184,148,0.08) 0%, transparent 65%);
            pointer-events: none; z-index: 0;
        }
        nav {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 2.5rem; height: 64px;
            background: rgba(244,243,255,0.82); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .nav-logo {
            font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.35rem;
            letter-spacing: -0.5px; color: var(--text); text-decoration: none;
            display: flex; align-items: center; gap: 0.55rem;
        }
        .nav-logo-dot {
            width: 9px; height: 9px; border-radius: 50%; background: var(--accent);
            box-shadow: 0 0 0 3px rgba(108,99,255,0.18);
            animation: breathe 2.2s ease-in-out infinite;
        }
        @keyframes breathe {
            0%,100% { box-shadow: 0 0 0 3px rgba(108,99,255,0.18); }
            50%      { box-shadow: 0 0 0 6px rgba(108,99,255,0.07); }
        }
        .nav-right { display: flex; align-items: center; gap: 0.75rem; }
        .btn-nav-outline {
            font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500;
            padding: 0.42rem 1rem; border-radius: 8px;
            border: 1.5px solid var(--border2); background: transparent;
            color: var(--accent); text-decoration: none; transition: all 0.18s;
        }
        .btn-nav-outline:hover { background: rgba(108,99,255,0.07); }
        .btn-logout {
            font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500;
            padding: 0.42rem 1rem; border-radius: 8px;
            border: 1px solid rgba(239,68,68,0.25); background: rgba(239,68,68,0.06);
            color: #dc2626; cursor: pointer; transition: all 0.18s;
        }
        .btn-logout:hover { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.4); }

        main {
            position: relative; z-index: 1;
            max-width: 1200px; margin: 0 auto; padding: 3rem 2.5rem 5rem;
        }
        .page-header { margin-bottom: 2.5rem; animation: fadeUp 0.5s ease both; }
        .page-eyebrow {
            display: inline-flex; align-items: center; gap: 0.5rem;
            font-size: 0.72rem; font-weight: 600; letter-spacing: 0.14em;
            text-transform: uppercase; color: var(--accent); margin-bottom: 0.4rem;
        }
        .page-eyebrow::before {
            content: ''; display: block; width: 18px; height: 1.5px;
            background: var(--accent); border-radius: 2px;
        }
        .page-title {
            font-family: 'Syne', sans-serif; font-weight: 800;
            font-size: 2rem; letter-spacing: -1px; color: var(--text);
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.25rem; animation: fadeUp 0.5s 0.08s ease both;
        }

        .evento-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 20px; overflow: hidden; box-shadow: var(--shadow);
            transition: transform 0.22s, box-shadow 0.22s, border-color 0.22s;
            display: flex; flex-direction: column;
        }
        .evento-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--border2); }
        .evento-card.pasado { opacity: 0.7; }

        .card-top-bar {
            height: 4px;
            background: linear-gradient(90deg, var(--accent3), var(--accent));
        }
        .card-top-bar.pasado { background: linear-gradient(90deg, var(--muted), rgba(152,150,176,0.3)); }

        .card-body { padding: 1.4rem 1.4rem 0; flex: 1; }

        .card-status-row {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 0.75rem;
        }
        .status-badge {
            display: inline-flex; align-items: center; gap: 0.35rem;
            font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em;
            text-transform: uppercase; padding: 0.22rem 0.6rem;
            border-radius: 999px; border: 1px solid;
        }
        .status-badge.activo {
            color: #047857; border-color: rgba(4,120,87,0.22); background: rgba(4,120,87,0.07);
        }
        .status-badge.activo::before {
            content: ''; width: 5px; height: 5px; border-radius: 50%;
            background: #10b981; animation: blink 2s ease-in-out infinite;
        }
        .status-badge.pasado {
            color: var(--muted2); border-color: rgba(107,105,133,0.2); background: rgba(107,105,133,0.06);
        }
        .status-badge.pasado::before {
            content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--muted);
        }
        @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

        .card-titulo {
            font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.05rem;
            letter-spacing: -0.3px; color: var(--text); margin-bottom: 0.4rem;
        }
        .card-desc {
            font-size: 0.84rem; color: var(--muted2); line-height: 1.5;
            margin-bottom: 0.9rem;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .card-divider { height: 1px; background: var(--border); margin-bottom: 0.85rem; }
        .card-meta { display: flex; flex-direction: column; gap: 0.32rem; margin-bottom: 1rem; }
        .meta-item {
            display: flex; align-items: center; gap: 0.5rem;
            font-size: 0.8rem; color: var(--muted2);
        }
        .meta-item svg { color: var(--muted); flex-shrink: 0; }

        /* QR section */
        .qr-section {
            display: flex; flex-direction: column; align-items: center;
            padding: 1rem 1.4rem;
            background: var(--bg); border-top: 1px solid var(--border);
        }
        .qr-label {
            font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em;
            text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem;
        }
        .qr-wrap {
            background: white; border-radius: 12px; padding: 10px;
            border: 1px solid var(--border); display: inline-flex;
        }

        /* Card footer */
        .card-footer-area { padding: 1rem 1.4rem; }
        .btn-cancelar {
            width: 100%; font-family: 'DM Sans', sans-serif; font-size: 0.83rem; font-weight: 600;
            color: #dc2626; background: rgba(220,38,38,0.06);
            border: 1.5px solid rgba(220,38,38,0.2); border-radius: 10px;
            padding: 0.55rem 1rem; cursor: pointer; transition: all 0.18s;
        }
        .btn-cancelar:hover { background: rgba(220,38,38,0.12); border-color: rgba(220,38,38,0.35); }
        .evento-pasado-tag {
            display: flex; align-items: center; justify-content: center; gap: 0.4rem;
            font-size: 0.8rem; color: var(--muted); padding: 0.4rem 0;
        }

        .empty {
            grid-column: 1/-1; padding: 4rem 2rem; text-align: center;
            color: var(--muted); font-size: 0.9rem;
            background: var(--surface); border: 1.5px dashed var(--border2); border-radius: 20px;
        }
        .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

        @media (max-width: 640px) {
            main { padding: 2rem 1.25rem 4rem; }
            nav { padding: 0 1.25rem; }
        }
    </style>
</head>
<body>
<nav>
    <a class="nav-logo" href="/"><span class="nav-logo-dot"></span>syncro</a>
    <div class="nav-right">
        <a href="/eventos" class="btn-nav-outline">Ver eventos</a>
        <form action="/logout" method="post" style="margin:0">
            <button class="btn-logout" type="submit">Cerrar sesión</button>
        </form>
    </div>
</nav>

<main>
    <div class="page-header">
        <div class="page-eyebrow">Mi cuenta</div>
        <h1 class="page-title">Mis inscripciones</h1>
    </div>
    <div class="cards-grid" id="misInscripciones">
        <div class="empty"><div class="empty-icon">🎟️</div>Cargando inscripciones...</div>
    </div>
</main>

<script>
    fetch('/mis-eventos/lista')
        .then(res => res.json())
        .then(inscripciones => {
            const c = document.getElementById('misInscripciones');
            if (!inscripciones.length) {
                c.innerHTML = '<div class="empty"><div class="empty-icon">🎟️</div>No tienes inscripciones activas.</div>';
                return;
            }
            c.innerHTML = '';
            inscripciones.forEach(i => {
                const e = i.evento;
                const yaFue = new Date(e.fechaHora) < new Date();
                const fecha = new Date(e.fechaHora).toLocaleString('es', { dateStyle: 'medium', timeStyle: 'short' });

                const card = document.createElement('div');
                card.className = `evento-card${yaFue ? ' pasado' : ''}`;
                card.innerHTML = `
          <div class="card-top-bar${yaFue ? ' pasado' : ''}"></div>
          <div class="card-body">
            <div class="card-status-row">
              <span class="status-badge ${yaFue ? 'pasado' : 'activo'}">${yaFue ? 'Finalizado' : 'Próximo'}</span>
            </div>
            <div class="card-titulo">${e.titulo}</div>
            ${e.descripcion ? `<div class="card-desc">${e.descripcion}</div>` : ''}
            <div class="card-divider"></div>
            <div class="card-meta">
              <div class="meta-item">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
                </svg>${e.lugar}
              </div>
              <div class="meta-item">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                </svg>${fecha}
              </div>
              <div class="meta-item">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                  <circle cx="9" cy="7" r="4"/>
                </svg>Cupo: <strong style="color:var(--text);margin-left:2px">${e.cupoMaximo}</strong>
              </div>
            </div>
          </div>
          <div class="qr-section">
            <div class="qr-label">Tu código QR de acceso</div>
            <div class="qr-wrap" id="qr-${i.id}"></div>
          </div>
          <div class="card-footer-area">
            ${!yaFue
                    ? `<form action="/eventos/${e.id}/cancelar-inscripcion" method="post">
                   <button class="btn-cancelar" type="submit">Cancelar inscripción</button>
                 </form>`
                    : `<div class="evento-pasado-tag">
                   <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                     <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                   </svg>Evento ya realizado
                 </div>`
                }
          </div>`;
                c.appendChild(card);

                requestAnimationFrame(() => {
                    const qrDiv = document.getElementById(`qr-${i.id}`);
                    if (qrDiv) {
                        new QRCode(qrDiv, {
                            text: JSON.stringify({ eventoId: e.id, usuarioId: i.usuario.idUser, token: i.token }),
                            width: 120, height: 120
                        });
                    }
                });
            });
        });
</script>
</body>
</html>
