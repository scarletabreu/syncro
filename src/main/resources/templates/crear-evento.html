<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Crear Evento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .navbar { background: white; border-bottom: 1px solid #e5e7eb; }
        .card { border-radius: 20px; border: 1px solid #e5e7eb; box-shadow: 0 20px 40px rgba(0,0,0,0.06); }
        .form-control, .form-select { border-radius: 12px; padding: 0.75rem 1rem; border: 1px solid #e5e7eb; }
        .form-control:focus { border-color: #4f46e5; box-shadow: 0 0 0 0.15rem rgba(79,70,229,0.15); }
        .btn-create { background-color: #4f46e5; border: none; border-radius: 999px; padding: 0.6rem 1.2rem; font-weight: 600; }
        .btn-create:hover { background-color: #4338ca; }
        label { font-weight: 500; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Sistema de Gestion de Eventos</a>
        <div class="d-flex gap-2">
            <a href="/eventos" class="btn btn-outline-secondary btn-sm">← Volver</a>
            <form action="/logout" method="post">
                <button class="btn btn-outline-danger btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <div class="card p-4" style="max-width: 600px; margin: auto;">
        <h2 class="fw-bold mb-1 text-center">Crear Evento</h2>
        <p class="text-center text-muted mb-4">Completa los datos del evento</p>

        <form action="/eventos" method="post">

            <div class="mb-3">
                <label class="form-label">Título</label>
                <input name="titulo" class="form-control" placeholder="Título del evento" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Descripción</label>
                <textarea name="descripcion" class="form-control" rows="3" placeholder="Descripción del evento"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Fecha y hora</label>
                <input name="fechaHora" type="datetime-local" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Lugar</label>
                <input name="lugar" class="form-control" placeholder="Lugar del evento" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Cupo máximo</label>
                <input name="cupoMaximo" type="number" min="1" class="form-control" placeholder="Ej: 50" required>
            </div>

            <button type="submit" class="btn btn-create btn-primary w-100 mt-2">Crear Evento</button>
        </form>
    </div>
</div>

</body>
</html>
